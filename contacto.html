  <main>
    <section id="contact">
      <h2>¿Hablamos?</h2>
      <p>¿Tienes un proyecto en mente? Escríbeme.</p>

      <form id="contact-form">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" placeholder="Tu nombre" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label for="subject">Asunto</label>
          <input type="text" id="subject" name="subject" placeholder="¿De qué se trata?" required />
        </div>
        <div class="form-group">
          <label for="message">Mensaje</label>
          <textarea id="message" name="message" rows="5" placeholder="Cuéntame..." required></textarea>
        </div>
        <button type="submit" class="btn-send">Enviar mensaje</button>
        <p id="form-status"></p>
      </form>
    </section>
  </main>
